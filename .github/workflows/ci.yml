name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Install dependencies
        run: go mod download

      - name: Check go mod tidy
        run: |
          go mod tidy
          if [ -n "$(git status --porcelain go.mod go.sum)" ]; then
            echo "go.mod or go.sum is not tidy. Please run 'go mod tidy' and commit the changes."
            git status --porcelain go.mod go.sum
            exit 1
          fi

      - name: Linting
        run: make lint

      - name: Generate code
        run: make gen

      - name: Check for uncommitted changes after generation
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "Untracked or uncommitted changes found after 'make lint && make gen'. Please run 'make lint && make gen' locally and commit the changes."
            git status --porcelain
            exit 1
          fi

      - name: Run tests
        run: make test

      - name: Build
        run: make build

